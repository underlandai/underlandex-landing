name: Refresh product preview screenshots

on:
  schedule:
    # 02:00 UTC daily (12:00 AEST)
    - cron: '0 2 * * *'
  workflow_dispatch: {}

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Capture screenshots
        run: node scripts/capture-previews.mjs
        env:
          PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet src/assets/images/underlandex/preview-*.png; then
            echo "No changes, skipping commit."
          else
            git add src/assets/images/underlandex/preview-*.png
            git commit -m "chore(previews): nightly refresh of Explorer + M&A screenshots"
            git push
          fi
